apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent.fullname" . }}
  labels:
    {{- include "agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.agent.replicaCount }}
  selector:
    matchLabels:
      {{- include "agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agent.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.agent.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
      {{- include "agent.podSecurityContext" . | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            allowPrivilegeEscalation: false
          {{- include "agent.image" . | nindent 10 }}
          #NB! configMap is created by job.yaml
          envFrom:
            - configMapRef:
                optional: true
                name: {{ include "agent.fullname" . }}-config
          env:
            {{- include "agent.commonEnv" . | nindent 12 }}
            {{- include "agent.modelParamsOverride" . | nindent 12 }}
            - name: USE_CUDA
              value: {{ .Values.agent.use_cuda | default "false" | quote }}
            {{- range .Values.agent.envVars }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
            {{- include "agent.resources" . | nindent 10 }}
          {{- if .Values.agent.extraVolumeMounts }}
          volumeMounts:
          {{- toYaml .Values.agent.extraVolumeMounts | nindent 12 }}
          {{- end }}
      {{- if .Values.agent.extraVolumes }}
      volumes:
      {{- toYaml .Values.agent.extraVolumes | nindent 8 }}
      {{- end }}
