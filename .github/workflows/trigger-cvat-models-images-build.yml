name: Trigger Agent Image Builds

on:
  workflow_dispatch:
  release:
    types: [released]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Generate authentication token
        id: gen-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CVAT_BOT_APP_ID }}
          private-key: ${{ secrets.CVAT_BOT_PRIVATE_KEY }}
          repositories: "cvat-models"

      - name: Trigger build in cvat-models
        env:
          GH_TOKEN: "${{ steps.gen-token.outputs.token }}"
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/cvat-ai/cvat-models/actions/workflows/build-push-agent-images.yml/dispatches \
            -d '{"ref":"develop","inputs":{"tag_name":"${{ github.event.release.tag_name }}"}}'
