name: Build CVAT UI Image

on:
  push:
    branches:
      - main
    paths:
      - 'cvat-ui/**'
      - 'cvat-core/**'
      - 'cvat-canvas/**'
      - 'cvat-canvas3d/**'
      - 'cvat-data/**'
      - 'Dockerfile.ui'
      - 'package.json'
      - 'yarn.lock'
      - '.yarnrc.yml'
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: multiagentvision/cvat-ui
  K8S_DEPLOYMENT_FILE: k8s/cvat-ui/deployment.yaml

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ui
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Bump k8s deployment image tag
        if: ${{ github.ref == 'refs/heads/main' }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="sha-$(echo "$GITHUB_SHA" | cut -c1-7)"
          FILE="${K8S_DEPLOYMENT_FILE}"

          if [[ ! -f "$FILE" ]]; then
            echo "Expected file not found: $FILE" >&2
            exit 1
          fi

          sed -i "s|image: ${REGISTRY}/${IMAGE_NAME}:.*|image: ${REGISTRY}/${IMAGE_NAME}:${TAG}|" "$FILE"

          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "chore(cvat-ui): bump image ${TAG}"
          git push

      - name: Summary
        run: |
          echo "### ✅ CVAT UI image built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
