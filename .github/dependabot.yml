version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Python dependencies in cvat/requirements are managed by pip-compile-multi.
  # Dependabot should update source *.in files; generated *.txt files are
  # regenerated by a separate workflow.
  - package-ecosystem: "pip"
    directory: "/utils/dataset_manifest"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    exclude-paths:
      - "*.txt"

  # Keep the large CVAT requirements graph on a small PR budget. Dependabot
  # resolves the full input graph for each candidate update, so processing too
  # many Python updates in one run can hit the updater timeout.
  - package-ecosystem: "pip"
    directory: "/cvat/requirements"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    exclude-paths:
      - "*.txt"
      - "all.in"
