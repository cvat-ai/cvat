version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "docker"
    directory: "/ai-models/agents_deployment/templates/docker-compose"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "docker"
    directory: "/ai-models/agents_deployment/transformers"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "docker"
    directory: "/ai-models/agents_deployment/yolo"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "docker"
    directory: "/ai-models/agents_deployment/sam2"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "docker"
    directory: "/serverless/openvino/base"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "docker"
    directory: "/serverless/openvino/omz/intel/face-detection-0205/nuclio"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "docker"
    directory: "/serverless/openvino/omz/public/mask_rcnn_inception_resnet_v2_atrous_coco/nuclio"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # Python dependencies in cvat/requirements are managed by pip-compile-multi.
  # Dependabot should update source *.in files; generated *.txt files are
  # regenerated by a separate workflow.
  - package-ecosystem: "pip"
    directory: "/utils/dataset_manifest"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    exclude-paths:
      - "*.txt"

  # Dependabot resolves the full CVAT requirements graph for each candidate
  # update, while generated lock files are refreshed by the workflow below.
  - package-ecosystem: "pip"
    directory: "/cvat/requirements"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    exclude-paths:
      - "*.txt"
      - "all.in"
