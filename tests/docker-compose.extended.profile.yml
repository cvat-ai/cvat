services:
  cvat_server:
    environment:
      CVAT_ANALYTICS: 0
      DJANGO_LOG_SERVER_HOST: 127.0.0.1
      NUMPROCS: 1

  cvat_worker_chunks:
    depends_on: !reset []
    environment:
      NUMPROCS: 1

  cvat_worker_export:
    depends_on: !reset []
    environment:
      NUMPROCS: 1

  cvat_worker_import:
    depends_on: !reset []
    environment:
      NUMPROCS: 1

  cvat_ui:
    profiles:
      - full

  cvat_grafana:
    profiles:
      - full

  cvat_vector:
    profiles:
      - full
