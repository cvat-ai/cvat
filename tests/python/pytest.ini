[pytest]
required_plugins = pytest-timeout pytest-cases
addopts = --verbose --capture=tee-sys

# We expect no regular individual test to run too long
# can be overridden for specific tests with a test decorator
timeout = 15

markers =
    infra_profile(name): Minimum required execution profile: core, extended, full.
    parallel_group(mode): Parallel balancing mode. Use "case" (default), "class", or "function".
    infra_required_core: Auto-assigned marker for tests requiring core profile.
    infra_required_extended: Auto-assigned marker for tests requiring extended profile.
    infra_required_full: Auto-assigned marker for tests requiring full profile.

filterwarnings =
    ignore::DeprecationWarning:cvat_sdk.core
