{{- if .Values.minio.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: minio
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: test-chart
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  accessKey: {{ .Values.minio.accessKey | toString | toYaml }}
  secretKey: {{ .Values.minio.secretKey | toString | toYaml }}
{{- end }}
