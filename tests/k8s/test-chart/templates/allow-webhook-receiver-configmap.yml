apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "test-chart.allowWebhookReceiverConfigMapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: test-chart
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  allow_webhook_receiver.sh: |
{{- if and .Values.webhookReceiver.enabled .Values.smokescreen.allowWebhookReceiver }}
    webhook_receiver_ip_addr="$(getent hosts {{ include "test-chart.webhookReceiverServiceName" . }} | head -1 | awk '{ print $1 }')"
    if [ -n "${webhook_receiver_ip_addr}" ]; then
      export SMOKESCREEN_OPTS="$SMOKESCREEN_OPTS --allow-address=\"${webhook_receiver_ip_addr}\""
    fi
{{- else }}
    :
{{- end }}
