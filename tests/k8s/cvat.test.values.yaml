cvat:
  backend:
    additionalVolumes:
    - name: allow-minio
      configMap:
        name: allow-minio
        defaultMode: 493 # 0755
    - name: allow-webhook-receiver
      configMap:
        name: allow-webhook-receiver
        defaultMode: 493 # 0755
    additionalVolumeMounts:
    - mountPath: /etc/cvat/init.d/allow_minio.sh
      name: allow-minio
      subPath: allow_minio.sh
    - mountPath: /etc/cvat/init.d/allow_webhook_receiver.sh
      name: allow-webhook-receiver
      subPath: allow_webhook_receiver.sh
    defaultStorage:
      accessModes:
      - ReadWriteOnce
    server:
      additionalVolumeMounts:
      - mountPath: /home/django/share
        name: cvat-backend-data
        subPath: share
      additionalEnv:
      - name: DJANGO_SETTINGS_MODULE
        value: cvat.settings.testing_rest
      - name: CVAT_ACCESS_TOKEN_STALE_PERIOD
        value: "3153600000"
    worker:
      additionalEnv:
      - name: DJANGO_SETTINGS_MODULE
        value: cvat.settings.testing_rest
      - name: CVAT_ACCESS_TOKEN_STALE_PERIOD
        value: "3153600000"
      annotation:
        replicas: 0
      chunks:
        replicas: 0
      consensus:
        replicas: 0
      export:
        replicas: 0
      import:
        replicas: 0
      qualityreports:
        replicas: 0
      webhooks:
        replicas: 1
      utils:
        replicas: 1
        additionalVolumeMounts:
        - mountPath: /home/django/share
          name: cvat-backend-data
          subPath: share
        extraArgs:
        - "annotation"
        - "chunks"
        - "consensus"
        - "export"
        - "import"
        - "quality_reports"
    imagePullPolicy: Never
  frontend:
    imagePullPolicy: Never

redis:
  master:
    disableCommands: []

keydb:
  resources:
    requests:

traefik:
  logs:
    general:
      level: DEBUG
    access:
      enabled: true
