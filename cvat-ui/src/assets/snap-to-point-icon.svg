<!-- Snap to Point Icon - Simple: target point with circle and dashed line to moving point -->
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(-3 0)">
    <!-- Target point with snap circle -->
    <circle cx="18" cy="8" r="2" fill="currentColor"/>
    <circle cx="18" cy="8" r="4.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
    
    <!-- Moving point -->
    <circle cx="8" cy="16" r="2" fill="currentColor"/>
    
    <!-- Magnetic attraction line (dashed) -->
    <path d="M10 14.5L16 9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2 2"/>
  </g>
</svg>
