apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cvat-ui
  namespace: cvat
  labels:
    app.kubernetes.io/name: cvat-ui
    app.kubernetes.io/part-of: cvat
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
    - host: cvat.chessverse.local # измените на ваш домен
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cvat-ui
                port:
                  name: http
  # TLS (раскомментируйте для HTTPS)
  # tls:
  #   - hosts:
  #       - cvat.chessverse.local
  #     secretName: cvat-ui-tls
