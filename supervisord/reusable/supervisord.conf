[unix_http_server]
file = /tmp/supervisord/supervisor.sock

[supervisorctl]
serverurl = unix:///tmp/supervisord/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisord]
nodaemon = true
silent = true               ; disable logging to standard output by default in nodaemon mode
logfile = /dev/stdout       ; supervisord log file
logfile_maxbytes = 0        ; disable log rotation
loglevel = debug            ; info, debug, warn, trace
pidfile = /tmp/supervisord/supervisord.pid ; pidfile location
